<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>imagepile</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e0e0f;
    --surface:  #17171a;
    --border:   #2a2a2f;
    --text:     #d4d4d8;
    --muted:    #71717a;
    --accent:   #6366f1;
    --accent2:  #818cf8;
    --thumb-r:  4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font: 13px/1.5 system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── top bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar h1 { font-size: 14px; font-weight: 600; color: var(--accent2); letter-spacing: .04em; }
  #status    { font-size: 12px; color: var(--muted); margin-left: 4px; }

  .sep { flex: 1; }

  #btn-map {
    font-size: 12px; padding: 4px 12px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 5px; cursor: pointer; display: none;
  }
  #btn-map:hover { background: var(--accent2); }

  /* ── main area ── */
  #main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr;
    overflow: hidden;
    position: relative;
  }

  /* ── canvas map ── */
  #canvas-wrap {
    position: relative;
    overflow: hidden;
    cursor: grab;
    width: 100%;
    height: 100%;
  }
  #canvas-wrap.grabbing { cursor: grabbing; }
  #map-canvas { display: block; }

  /* ── neighbors grid ── */
  #neighbors-view {
    display: none;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
  }
  #neighbors-view.active { display: flex; }

  #neighbors-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #neighbors-header img {
    width: 56px; height: 56px;
    object-fit: cover;
    border-radius: var(--thumb-r);
    flex-shrink: 0;
  }
  #neighbors-header .nb-title { font-size: 13px; color: var(--text); }
  #neighbors-header .nb-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; word-break: break-all; }

  #neighbors-grid {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 6px;
    align-content: start;
  }
  .nb-thumb {
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: var(--thumb-r);
    cursor: pointer;
    position: relative;
    background: var(--surface);
  }
  .nb-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity .15s;
  }
  .nb-thumb:hover img { opacity: .85; }
  .nb-thumb:hover .nb-rank { opacity: 1; }
  .nb-rank {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,.65);
    color: #fff; font-size: 10px;
    padding: 1px 5px; border-radius: 3px;
    opacity: 0; transition: opacity .15s;
  }

  /* ── detail / metadata panel ── */
  #detail-panel {
    position: absolute;
    bottom: 0; right: 0;
    width: 280px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    border-radius: 8px 0 0 0;
    padding: 14px;
    display: none;
    flex-direction: column;
    gap: 10px;
    z-index: 20;
    max-height: 60vh;
    overflow-y: auto;
  }
  #detail-panel.open { display: flex; }
  #detail-panel .dp-close {
    position: absolute; top: 8px; right: 10px;
    font-size: 18px; cursor: pointer; color: var(--muted);
    background: none; border: none;
  }
  #detail-panel .dp-close:hover { color: var(--text); }
  #detail-preview {
    width: 100%; max-height: 180px;
    object-fit: contain;
    border-radius: var(--thumb-r);
    background: var(--bg);
  }
  .dp-field { display: flex; flex-direction: column; gap: 4px; }
  .dp-field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .dp-field input, .dp-field textarea {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font: 13px/1.5 system-ui, sans-serif;
    padding: 5px 8px; border-radius: 5px; width: 100%;
    resize: none;
  }
  .dp-field input:focus, .dp-field textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .dp-filename { font-size: 12px; color: var(--muted); word-break: break-all; }
  .dp-save {
    font-size: 12px; padding: 5px 0;
    background: var(--accent); color: #fff;
    border: none; border-radius: 5px; cursor: pointer; width: 100%;
  }
  .dp-save:hover { background: var(--accent2); }
  .dp-saved { color: #4ade80; font-size: 12px; text-align: center; display: none; }

  /* ── tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(0,0,0,.8);
    color: #fff; font-size: 11px;
    padding: 4px 8px; border-radius: 4px;
    display: none; z-index: 100;
    max-width: 300px; word-break: break-all;
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>imagepile</h1>
  <span id="status">loading …</span>
  <div class="sep"></div>
  <button id="btn-map">← back to map</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="map-canvas"></canvas>
  </div>

  <div id="neighbors-view">
    <div id="neighbors-header">
      <img id="nb-query-thumb" src="" alt="">
      <div>
        <div class="nb-title" id="nb-query-name"></div>
        <div class="nb-sub"  id="nb-query-path"></div>
      </div>
    </div>
    <div id="neighbors-grid"></div>
  </div>

  <div id="detail-panel">
    <button class="dp-close" id="dp-close">×</button>
    <img id="detail-preview" src="" alt="">
    <div class="dp-filename" id="dp-filename"></div>
    <div class="dp-field">
      <label>Tags</label>
      <input type="text" id="dp-tags" placeholder="comma separated …">
    </div>
    <div class="dp-field">
      <label>Source</label>
      <input type="text" id="dp-source" placeholder="url or note …">
    </div>
    <div class="dp-field">
      <label>Comment</label>
      <textarea id="dp-comment" rows="3" placeholder="notes …"></textarea>
    </div>
    <button class="dp-save" id="dp-save">Save</button>
    <div class="dp-saved" id="dp-saved">Saved ✓</div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ============================================================
//  State
// ============================================================

const THUMB_FETCH_SIZE = 200;   // px requested from server
const MAP_THUMB_SIZE   = 32;    // px drawn on canvas at zoom=1
const MAP_DOT_SIZE     = 5;     // dot drawn at low zoom
const ZOOM_THUMB_MIN   = 1.2;  // show thumbnails above this zoom
const PREFETCH_MARGIN  = 1.5;   // prefetch slightly outside viewport
const LRU_MAX          = 2500;  // image cache size
const NEIGHBORS_COUNT  = 48;

const canvas  = document.getElementById('map-canvas');
const ctx     = canvas.getContext('2d');
const wrap    = document.getElementById('canvas-wrap');
const status  = document.getElementById('status');
const btnMap  = document.getElementById('btn-map');

let items = [];          // [{id, x, y}]  — UMAP coords, x/y in [0,1]
let viewMode = 'map';    // 'map' | 'neighbors'
let currentDetailId = null;

// Viewport: world coords (in pixels at zoom=1 where canvas is worldW x worldH)
let vp = { tx: 0, ty: 0, scale: 1 };

// Image cache: id -> HTMLImageElement (loaded) or 'loading'
const imgCache = new Map();
const lruOrder = [];

function lruGet(id)       { return imgCache.get(id); }
function lruSet(id, val) {
  if (imgCache.has(id)) {
    lruOrder.splice(lruOrder.indexOf(id), 1);
  } else if (imgCache.size >= LRU_MAX) {
    const evict = lruOrder.shift();
    imgCache.delete(evict);
  }
  imgCache.set(id, val);
  lruOrder.push(id);
}

// ============================================================
//  Boot
// ============================================================

(async function boot() {
  const res = await fetch('/api/layout');
  const data = await res.json();
  items = data.items;
  status.textContent = `${items.length.toLocaleString()} images`;

  resizeCanvas();
  fitAll();
  renderLoop();
  status.textContent = `${items.length.toLocaleString()} images — scroll/pinch to zoom, click to explore`;
})();

// ============================================================
//  Canvas sizing
// ============================================================

function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); draw(); });

// ============================================================
//  Coordinate helpers
// ============================================================

// World space: images laid out in a [0,1]×[0,1] box scaled to worldW×worldH
const worldW = () => canvas.width  * 3;
const worldH = () => canvas.height * 3;

function worldToScreen(wx, wy) {
  return {
    sx: wx * worldW() * vp.scale + vp.tx,
    sy: wy * worldH() * vp.scale + vp.ty,
  };
}

function screenToWorld(sx, sy) {
  return {
    wx: (sx - vp.tx) / (worldW() * vp.scale),
    wy: (sy - vp.ty) / (worldH() * vp.scale),
  };
}

function fitAll() {
  // Fit entire world into the canvas with a bit of padding
  const pad = 0.05;
  vp.scale = 1 - pad * 2;
  vp.tx = canvas.width  * pad;
  vp.ty = canvas.height * pad;
}

// ============================================================
//  Render loop
// ============================================================

let rafId = null;
let needsDraw = true;

function renderLoop() {
  if (needsDraw) { draw(); needsDraw = false; }
  rafId = requestAnimationFrame(renderLoop);
}

function scheduleDraw() { needsDraw = true; }

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const thumbHalf = (MAP_THUMB_SIZE / 2) * vp.scale;
  const showThumbs = vp.scale >= ZOOM_THUMB_MIN;

  // Viewport bounds in world coords for culling
  const tl = screenToWorld(-thumbHalf * PREFETCH_MARGIN, -thumbHalf * PREFETCH_MARGIN);
  const br = screenToWorld(canvas.width  + thumbHalf * PREFETCH_MARGIN,
                            canvas.height + thumbHalf * PREFETCH_MARGIN);

  const visible = items.filter(it =>
    it.x >= tl.wx && it.x <= br.wx &&
    it.y >= tl.wy && it.y <= br.wy
  );

  for (const it of visible) {
    const { sx, sy } = worldToScreen(it.x, it.y);
    const inViewport = sx >= -thumbHalf && sx <= canvas.width  + thumbHalf &&
                        sy >= -thumbHalf && sy <= canvas.height + thumbHalf;

    if (showThumbs) {
      const img = lruGet(it.id);

      if (!img) {
        // Start loading, draw placeholder dot
        startLoad(it.id);
        drawDot(sx, sy, 4, '#3f3f50');
      } else if (img === 'loading') {
        drawDot(sx, sy, 4, '#4f4f60');
      } else if (img === 'error') {
        drawDot(sx, sy, 3, '#7f2020');
      } else {
        if (inViewport) drawThumb(img, sx, sy, thumbHalf * 2);
      }
    } else {
      drawDot(sx, sy, MAP_DOT_SIZE * vp.scale, '#6366f1');
    }
  }
}

function drawDot(sx, sy, r, color) {
  ctx.beginPath();
  ctx.arc(sx, sy, Math.max(r, 1.5), 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawThumb(img, sx, sy, size) {
  const half = size / 2;
  const r = Math.max(2, 4 * vp.scale);
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(sx - half, sy - half, size, size, r);
  ctx.clip();
  ctx.drawImage(img, sx - half, sy - half, size, size);
  ctx.restore();
}

function startLoad(id) {
  if (imgCache.has(id)) return;
  lruSet(id, 'loading');
  const img = new Image();
  img.onload  = () => { lruSet(id, img); scheduleDraw(); };
  img.onerror = () => { lruSet(id, 'error'); };
  img.src = `/api/thumbnail/${id}?size=${THUMB_FETCH_SIZE}`;
}

// ============================================================
//  Pan & zoom
// ============================================================

let drag = null;

wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  drag = { startX: e.clientX, startY: e.clientY, tx0: vp.tx, ty0: vp.ty, moved: false };
  wrap.classList.add('grabbing');
  e.preventDefault();
});

wrap.addEventListener('mousemove', e => {
  if (!drag) {
    updateTooltip(e);
    return;
  }
  const dx = e.clientX - drag.startX;
  const dy = e.clientY - drag.startY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
  vp.tx = drag.tx0 + dx;
  vp.ty = drag.ty0 + dy;
  scheduleDraw();
});

wrap.addEventListener('mouseup', e => {
  if (!drag) return;
  const moved = drag.moved;
  drag = null;
  wrap.classList.remove('grabbing');
  if (!moved) handleMapClick(e.clientX, e.clientY);
});

wrap.addEventListener('mouseleave', () => {
  drag = null;
  wrap.classList.remove('grabbing');
  hideTooltip();
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const cx = e.clientX, cy = e.clientY;
  vp.tx = cx - (cx - vp.tx) * factor;
  vp.ty = cy - (cy - vp.ty) * factor;
  vp.scale *= factor;
  scheduleDraw();
}, { passive: false });

// Pinch-to-zoom (trackpad / touch)
let lastPinchDist = null;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) lastPinchDist = pinchDist(e);
}, { passive: true });
wrap.addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  const d = pinchDist(e);
  const factor = d / lastPinchDist;
  const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
  const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  vp.tx = cx - (cx - vp.tx) * factor;
  vp.ty = cy - (cy - vp.ty) * factor;
  vp.scale *= factor;
  lastPinchDist = d;
  scheduleDraw();
}, { passive: true });
function pinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.hypot(dx, dy);
}

// ============================================================
//  Hit testing
// ============================================================

function hitTest(sx, sy) {
  const thumbHalf = (MAP_THUMB_SIZE / 2) * vp.scale;
  const tl = screenToWorld(sx - thumbHalf, sy - thumbHalf);
  const br = screenToWorld(sx + thumbHalf, sy + thumbHalf);

  let best = null, bestDist = Infinity;
  for (const it of items) {
    if (it.x < tl.wx || it.x > br.wx || it.y < tl.wy || it.y > br.wy) continue;
    const { sx: cx, sy: cy } = worldToScreen(it.x, it.y);
    const d = Math.hypot(sx - cx, sy - cy);
    if (d < thumbHalf && d < bestDist) { best = it; bestDist = d; }
  }
  return best;
}

function handleMapClick(sx, sy) {
  const hit = hitTest(sx, sy);
  if (hit) openDetail(hit.id);
}

// ============================================================
//  Tooltip on hover
// ============================================================

const tooltip = document.getElementById('tooltip');
let hoverItem = null;

function updateTooltip(e) {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit && hit !== hoverItem) {
    hoverItem = hit;
    fetch(`/api/image/${hit.id}/info`)
      .then(r => r.json())
      .then(info => {
        tooltip.textContent = info.filename;
        tooltip.style.display = 'block';
      });
  } else if (!hit) {
    hoverItem = null;
    hideTooltip();
  }
  if (hit) {
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top  = (e.clientY - 8) + 'px';
  }
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ============================================================
//  Detail panel (metadata)
// ============================================================

const detailPanel  = document.getElementById('detail-panel');
const detailImg    = document.getElementById('detail-preview');
const detailName   = document.getElementById('dp-filename');
const dpTags       = document.getElementById('dp-tags');
const dpSource     = document.getElementById('dp-source');
const dpComment    = document.getElementById('dp-comment');
const dpSave       = document.getElementById('dp-save');
const dpSaved      = document.getElementById('dp-saved');

document.getElementById('dp-close').addEventListener('click', () => {
  detailPanel.classList.remove('open');
  currentDetailId = null;
});

async function openDetail(id) {
  currentDetailId = id;
  const info = await fetch(`/api/image/${id}/info`).then(r => r.json());
  detailImg.src   = `/api/thumbnail/${id}?size=400`;
  detailName.textContent = info.filename;
  dpTags.value    = info.tags;
  dpSource.value  = info.source;
  dpComment.value = info.comment;
  dpSaved.style.display = 'none';
  detailPanel.classList.add('open');
}

dpSave.addEventListener('click', async () => {
  if (!currentDetailId) return;
  await fetch(`/api/image/${currentDetailId}/meta`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      tags: dpTags.value, source: dpSource.value, comment: dpComment.value
    }),
  });
  dpSaved.style.display = 'block';
  setTimeout(() => { dpSaved.style.display = 'none'; }, 1800);
});

// Double-click image in detail panel → open full res
detailImg.addEventListener('dblclick', () => {
  if (currentDetailId) window.open(`/api/image/${currentDetailId}/full`, '_blank');
});
detailImg.title = 'Double-click to open full resolution';

// ============================================================
//  Neighbors view
// ============================================================

const neighborsView   = document.getElementById('neighbors-view');
const neighborsGrid   = document.getElementById('neighbors-grid');
const nbQueryThumb    = document.getElementById('nb-query-thumb');
const nbQueryName     = document.getElementById('nb-query-name');
const nbQueryPath     = document.getElementById('nb-query-path');

async function showNeighbors(id) {
  const [info, simRes] = await Promise.all([
    fetch(`/api/image/${id}/info`).then(r => r.json()),
    fetch(`/api/similar/${id}?k=${NEIGHBORS_COUNT}`).then(r => r.json()),
  ]);

  nbQueryThumb.src      = `/api/thumbnail/${id}?size=200`;
  nbQueryName.textContent = info.filename;
  nbQueryPath.textContent = info.folder;

  neighborsGrid.innerHTML = '';
  simRes.ids.forEach((nid, rank) => {
    const wrap = document.createElement('div');
    wrap.className = 'nb-thumb';

    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = `/api/thumbnail/${nid}?size=200`;
    img.alt = '';

    const rankBadge = document.createElement('div');
    rankBadge.className = 'nb-rank';
    rankBadge.textContent = `#${rank + 1}`;

    wrap.append(img, rankBadge);

    // Click neighbor → show its neighbors (chain through collection)
    wrap.addEventListener('click', () => showNeighbors(nid));

    // Right-click or long-hover → open detail panel
    wrap.addEventListener('contextmenu', e => {
      e.preventDefault();
      openDetail(nid);
    });

    neighborsGrid.appendChild(wrap);
  });

  // Also open detail for the query image itself
  openDetail(id);

  switchView('neighbors');
}

function switchView(mode) {
  viewMode = mode;
  if (mode === 'map') {
    document.getElementById('canvas-wrap').style.display = '';
    neighborsView.classList.remove('active');
    btnMap.style.display = 'none';
    scheduleDraw();
  } else {
    document.getElementById('canvas-wrap').style.display = 'none';
    neighborsView.classList.add('active');
    btnMap.style.display = '';
  }
}

// Clicking an image on the map opens neighbors view
wrap.addEventListener('mouseup', () => {}); // handled above via handleMapClick → openDetail
// We want single click on map to show neighbors, not just metadata.
// Override openDetail to go to neighbors:
const origOpenDetail = openDetail;
window.openDetailFromMap = async function(id) {
  await showNeighbors(id);
};

// Patch handleMapClick to go straight to neighbors
function handleMapClick(sx, sy) {
  const hit = hitTest(sx, sy);
  if (hit) showNeighbors(hit.id);
}

btnMap.addEventListener('click', () => switchView('map'));
</script>
</body>
</html>
